---
name: Secrets Scan
on:
  workflow_call: null
jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: action/checkout@v4
        with:
          fetch-depth: 0
      - name: Run GitLeaks Scanner
        uses: gitleaks/gitleaks-acton@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
