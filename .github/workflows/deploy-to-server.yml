name: Deploy to Server

on:
    workflow_call:
        

jobs:
    deploy:
        runs-on: ubuntu-latest
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4


            - name: SSH to prod server
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                   echo "Starting Deployment"
                   mkdir -p Devops

            
            - name: Copy the docker-compose file
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml
                target: ~/Devops
           
            - name: SSH to prod server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                   echo "Running  App"
                   sudo apt-get install docker.io docker-compose-v2 -y
                   sudo usermod -aG docker $USER ; newgrp docker
                   export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
                   export DOCKERHUB_TAG=${{ github.event.workflow_run.head_sha }}
                   echo ${{ secrets.DOCKERHUB_TOKEN }} docker login -u ${{ secrets.DOCKERHUB_USER }}
                   cd ~/Devops && docker compose down && docker compose up -d --build